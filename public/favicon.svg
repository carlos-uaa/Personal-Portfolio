<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Gradiente Eléctrico para la 'C' -->
    <linearGradient id="vectorCian" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052a3" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Gradiente Neón para la 'G' -->
    <linearGradient id="vectorBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    
    <!-- Efecto Glow / Brillo sutil de pantalla -->
    <filter id="cyberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00c6ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Contenedor con brillo tecnológico -->
  <g filter="url(#cyberGlow)">
    
    <!-- ================= LETRA C ================= -->
    <path 
      d="M 240,110 
         L 150,110 
         L 90,170 
         L 90,230 
         L 150,290 
         L 240,290 
         L 240,235 
         L 165,235 
         L 145,215 
         L 145,185 
         L 165,165 
         L 240,165 
         Z" 
      fill="url(#vectorCian)" 
    />

    <!-- ================= LETRA G ================= -->
    <path 
      d="M 450,110 
         L 360,110 
         L 300,170 
         L 300,230 
         L 360,290 
         L 450,290 
         L 510,230 
         L 510,185 
         L 410,185 
         L 410,235 
         L 365,235 
         L 350,215 
         L 350,185 
         L 365,165 
         L 450,165 
         L 450,110 
         Z" 
      fill="url(#vectorBlue)" 
    />
    
    <!-- Nodo de conexión estética en medio de ambas letras (Estilo circuito) -->
    <rect x="268" y="188" width="24" height="24" transform="rotate(45 280 200)" fill="#00f2fe" opacity="0.7"/>
  </g>
</svg>
